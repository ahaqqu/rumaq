name: Production Smoke

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      refresh_token:
        description: 'New RUMAQ_PROD_SESSION cookie value (optional)'
        required: false
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Public health checks
        run: |
          # Check frontend loads
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://rumaq.pages.dev/)
          echo "Frontend status: $STATUS"
          if [ "$STATUS" != "200" ]; then echo "::error::Frontend returned $STATUS"; exit 1; fi

          # Check API health
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://rumaq.pages.dev/api/health)
          echo "API health status: $STATUS"
          if [ "$STATUS" != "200" ]; then echo "::error::API health returned $STATUS"; exit 1; fi

      - name: Authenticated checks
        if: ${{ secrets.RUMAQ_PROD_SESSION != '' }}
        env:
          SESSION: ${{ secrets.RUMAQ_PROD_SESSION }}
        run: |
          # Check /api/me
          BODY=$(curl -s -b "rumaq_session=$SESSION" https://rumaq.pages.dev/api/me)
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' -b "rumaq_session=$SESSION" https://rumaq.pages.dev/api/me)
          echo "/api/me status: $STATUS"
          if [ "$STATUS" != "200" ]; then echo "::error::/api/me returned $STATUS"; exit 1; fi

          # Validate response shape (has user object)
          echo "$BODY" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'user' in data, 'Missing user in /api/me response'
          print('/api/me shape OK')
          "

          # Check /api/stock
          BODY=$(curl -s -b "rumaq_session=$SESSION" https://rumaq.pages.dev/api/stock)
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' -b "rumaq_session=$SESSION" https://rumaq.pages.dev/api/stock)
          echo "/api/stock status: $STATUS"
          if [ "$STATUS" != "200" ]; then echo "::error::/api/stock returned $STATUS"; exit 1; fi

          # Validate response shape (has stock array)
          echo "$BODY" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'stock' in data and isinstance(data['stock'], list), 'Missing stock array in /api/stock response'
          print('/api/stock shape OK')
          "

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'smoke-failure',
              state: 'open',
            })

            const now = new Date().toISOString().slice(0, 10)
            const title = `Smoke test failure — ${now}`
            const existing = issues.find(i => i.title === title)

            if (existing) {
              console.log(`Issue #${existing.number} already exists`)
              return
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `Production smoke tests failed.\n\n[View failed run](${runUrl})\n\n**Action required:** Investigate the failure and fix or acknowledge.`,
              labels: ['smoke-failure'],
            })
