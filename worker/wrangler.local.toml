name = "rumaq-api"
main = "src/index.ts"
compatibility_date = "2024-06-30"
compatibility_flags = ["nodejs_compat"]

# Local dev — uses Miniflare, does not contact Cloudflare API
account_id = "LOCAL"

# CORS: allow the local Vite dev server
[vars]
PAGES_ORIGIN = "http://localhost:5173"

# D1 database binding (local Miniflare)
[[d1_databases]]
binding = "DB"
database_name = "rumaq"
database_id = "00000000-0000-0000-0000-000000000000"

# R2 bucket binding for receipt images (local Miniflare)
[[r2_buckets]]
binding = "RECEIPTS"
bucket_name = "rumaq-receipts"
