name = "rumaq-api"
main = "src/index.ts"
compatibility_date = "2024-06-30"
compatibility_flags = ["nodejs_compat"]

# Test environment — uses Miniflare via worker-server.mjs, does not contact Cloudflare API
account_id = "LOCAL"

# CORS: allow the Docker proxy origin
[vars]
PAGES_ORIGIN = "http://localhost:3000"

# D1 database binding (local Miniflare)
[[d1_databases]]
binding = "DB"
database_name = "rumaq"
database_id = "00000000-0000-0000-0000-000000000000"

# R2 bucket binding for receipt images (local Miniflare)
[[r2_buckets]]
binding = "RECEIPTS"
bucket_name = "rumaq-receipts"
